version: "3.8"

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  profile-service:
    build: ./profile-service
    ports:
      - "3002:3002"

  post-service:
    build: ./post-service
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: redis://redis:6379
      PROFILE_SERVICE_URL: http://profile-service:3002
    depends_on:
      - redis
      - profile-service
